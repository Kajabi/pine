name: "Pine Continuous Deployment"

# Restrict default permissions to read-only for security (principle of least privilege)
# Jobs that need more permissions (like release) explicitly override this
permissions:
  contents: read

on:
  # Release cadence today is **manual / on-demand** via `workflow_dispatch` (and `workflow_call`
  # from other automation). There is no weekly cron publish yet.
  #
  # When the team wants a fixed cadence (for example weekly npm publishes), uncomment and adjust:
  # schedule:
  #   - cron: '00 04 * * 1' # example: 4 am UTC Mondays
  #
  # Until then, maintainers cut versions from the default branch using the dispatch form in GitHub
  # Actions for this workflow ("Pine Continuous Deployment").

  workflow_call:
    inputs:
      preid:
        description: 'The prerelease id used when doing a prerelease. e.g prerelease, premajor, preminor, etc.'
        type: string
        default: ''

      ref:
        description: 'This could be a branch name, tag, or a SHA.'
        type: string
        default: ''

      tag:
        description: 'The tag to publish on NPM.'
        required: true
        type: string

      version:
        description: 'The type of version to release.'
        required: true
        type: string

    secrets:
      NPM_TOKEN:
        required: true
      KAJABI_CI_GH_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      preid:
        type: string
        description: Which prerelease id should be used? This is only needed when a version is "prepatch", "preminor", "premajor", or "prerelease".
        default: ''
          # - ''
          # - alpha
          # - beta
          # - rc
          # - next

      ref:
        type: string
        description: The branch name, tag, or SHA to be checked out. This can also be left blank.
        default: ''

      tag:
        type: choice
        required: true
        description: Which npm tag should this be published to?
        options:
          - latest
          - next
          - dev

      version:
        type: choice
        description: Which version should be published?
        options:
          - ''
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease

jobs:
  build-core:
    runs-on: ubuntu-latest

    steps:
      - name: Set SHA
        uses: nrwl/nx-set-shas@v5

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/workflows/actions/setup
        with:
          token: ${{ secrets.NPM_TOKEN }}

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Build Core
        uses: ./.github/workflows/actions/build-core

  build-react:
    runs-on: ubuntu-latest

    steps:
      - name: Set SHA
        uses: nrwl/nx-set-shas@v5

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/workflows/actions/setup
        with:
          token: ${{ secrets.NPM_TOKEN }}

      - name: Build React
        uses: ./.github/workflows/actions/build-react


  build-doc-components:
    runs-on: ubuntu-latest

    steps:
      - name: Set SHA
        uses: nrwl/nx-set-shas@v5

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/workflows/actions/setup
        with:
          token: ${{ secrets.NPM_TOKEN }}

      - name: Build Doc Components
        uses: ./.github/workflows/actions/build-doc-components

  release:
    permissions:
      contents: write
      id-token: write
    needs: [build-core, build-react, build-doc-components]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.KAJABI_CI_GH_TOKEN }}

      - name: Pin origin remote to PAT identity
        run: git remote set-url origin "https://x-access-token:${KAJABI_CI_GH_TOKEN}@github.com/${{ github.repository }}.git"
        env:
          KAJABI_CI_GH_TOKEN: ${{ secrets.KAJABI_CI_GH_TOKEN }}

      - name: Get Latest
        run: git pull
        shell: bash

      - name: Set up Node.js (pinned npm)
        uses: ./.github/workflows/actions/setup-node-with-pinned-npm
        with:
          node-version-file: '.nvmrc'

      - name: Verify NPM Cache
        shell: bash
        run: npm cache verify

      - name: Get NPM cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_ENV

      - name: Configure user
        run: |
          git config user.name "DSS Automation Bot"
          git config user.email "dev+github-bot@kajabi.com"
        shell: bash

      # - name: Restore Core built Cache
      #   uses: ./.github/workflows/actions/download-archive
      #   with:
      #     name: pine-core
      #     path: libs/core
      #     filename: CoreBuild.zip

      # - name: Restore React built Cache
      #   uses: ./.github/workflows/actions/download-archive
      #   with:
      #     name: pine-react
      #     path: libs/react
      #     filename: ReactBuild.zip

      # - name: Restore Doc Components built cache
      #   uses: ./.github/workflows/actions/download-archive
      #   with:
      #     name: pine-doc-components
      #     path: libs/doc-components
      #     filename: DocComponentsBuild.zip

      - name: Install Dependencies
        run: npm ci --ignore-scripts
        shell: bash

      - name: Build All
        run: npx nx run-many --target=build --all
        shell: bash

      - name: Prepare NPM Token
        run: echo //registry.npmjs.org/:_authToken=${NPM_TOKEN} >> .npmrc
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        if: ${{ inputs.version == '' }}
        run: npx nx release --yes
        env:
          GH_TOKEN: ${{ secrets.KAJABI_CI_GH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      ### Steps below are used for releasing a specified version type (major, minor, patch, etc.)
      - name: Release with Input Version
        if: ${{ inputs.version != '' }}
        run: npx nx release ${{ inputs.version }} --preid ${{ inputs.preid }} --yes
        env:
          GH_TOKEN: ${{ secrets.KAJABI_CI_GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # nx release commits locally but does not push (createRelease: false). We
      # regenerate the lockfile with the same npm CI uses, amend it into the
      # release commit, fix the commit message, verify npm ci, then push once.
      - name: Finalize release commit, push, and create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.KAJABI_CI_GH_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main
          git pull --rebase --autostash origin main

          if git merge-base --is-ancestor HEAD origin/main; then
            echo "Release did not create a new commit; nothing to finalize."
            exit 0
          fi

          VERSION=$(node -p "require('./libs/core/package.json').version")
          TAG="v${VERSION}"
          COMMIT_MSG="chore(release): release ${VERSION}"

          rm -rf node_modules
          npm install --ignore-scripts

          NEEDS_AMEND=false
          if ! git diff --quiet -- package-lock.json; then
            git add package-lock.json
            NEEDS_AMEND=true
          fi
          if [[ "$(git log -1 --format=%s)" != "$COMMIT_MSG" ]]; then
            NEEDS_AMEND=true
          fi
          if [[ "$NEEDS_AMEND" == "true" ]]; then
            git commit --amend -m "$COMMIT_MSG"
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -f "$TAG"
            TAG_FORCE_PUSH=true
          else
            git tag "$TAG"
            TAG_FORCE_PUSH=false
          fi

          rm -rf node_modules
          if ! npm ci --ignore-scripts; then
            echo "::error::Lockfile still fails npm ci after regeneration."
            exit 1
          fi

          git push origin HEAD:main
          if [[ "$TAG_FORCE_PUSH" == "true" ]]; then
            git push origin "$TAG" --force
          else
            git push origin "$TAG"
          fi

          NOTES_FILE=$(mktemp)
          trap 'rm -f "$NOTES_FILE"' EXIT
          awk -v ver="$VERSION" '/^## / { if (found) exit; if ($2 == ver) found=1; next } found { print }' CHANGELOG.md > "$NOTES_FILE"
          if gh release view "$TAG" >/dev/null 2>&1; then
            if [[ -s "$NOTES_FILE" ]]; then
              gh release edit "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
            else
              echo "::warning::No changelog section found for ${VERSION}; leaving existing release notes."
            fi
          elif [[ -s "$NOTES_FILE" ]]; then
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE"
          else
            echo "::warning::No changelog section found for ${VERSION}; using generated notes."
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

  send-slack-notification:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest
        run: git pull
        shell: bash

      - name: Fetch latest tags
        run: git fetch --tags
        shell: bash

      - name: Setup ENV Vars
        run: |
          # Get the latest git tag (which is the version just released)
          VERSION=$(git describe --tags --abbrev=0)
          CURRENT_DATE=$(date +'%B %d, %Y')

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "CURRENT_DATE=$CURRENT_DATE" >> $GITHUB_ENV
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/tag/$VERSION" >> $GITHUB_ENV
        shell: bash

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v3.0.3
        env:
          DATE: ${{ env.CURRENT_DATE }}
          RELEASE_URL: ${{ env.RELEASE_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL_NAME }}
          VERSION: ${{ env.VERSION }}
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: "./.github/workflows/slack_payloads/release-info.json"
          payload-templated: true
